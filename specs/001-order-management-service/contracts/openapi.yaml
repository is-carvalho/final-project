openapi: 3.1.0
info:
  title: Order Management Service API
  version: 0.1.0
servers:
  - url: http://localhost:8080
security:
  - bearerAuth: []
paths:
  /api/v1/orders:
    post:
      summary: Create an order
      operationId: createOrder
      security:
        - bearerAuth:
            - orders:write
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        '201':
          description: Order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        default:
          $ref: '#/components/responses/Problem'
    get:
      summary: Find orders by customer
      operationId: findOrders
      security:
        - bearerAuth:
            - orders:read
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - name: customerId
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Matching orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'
        default:
          $ref: '#/components/responses/Problem'
  /api/v1/orders/{id}:
    get:
      summary: Get an order
      operationId: getOrder
      security:
        - bearerAuth:
            - orders:read
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          description: Order found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      summary: Cancel an order
      operationId: cancelOrder
      security:
        - bearerAuth:
            - orders:write
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          description: Order cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        default:
          $ref: '#/components/responses/Problem'
  /api/v1/orders/{id}/items:
    post:
      summary: Add or increase an order item
      operationId: addOrderItem
      security:
        - bearerAuth:
            - orders:write
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/OrderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddOrderItemRequest'
      responses:
        '200':
          description: Item added or quantity increased
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        default:
          $ref: '#/components/responses/Problem'
  /api/v1/orders/{id}/items/{itemId}:
    delete:
      summary: Remove an order item
      operationId: removeOrderItem
      security:
        - bearerAuth:
            - orders:write
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/OrderId'
        - name: itemId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Item removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        default:
          $ref: '#/components/responses/Problem'
  /api/v1/orders/{id}/confirm:
    post:
      summary: Confirm an order
      operationId: confirmOrder
      security:
        - bearerAuth:
            - orders:write
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          description: Order confirmed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        default:
          $ref: '#/components/responses/Problem'
  /api/v1/payments:
    post:
      summary: Initiate payment for an order
      operationId: initiatePayment
      security:
        - bearerAuth:
            - payments:write
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InitiatePaymentRequest'
      responses:
        '202':
          description: Payment initiation accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
        default:
          $ref: '#/components/responses/Problem'
  /api/v1/payments/{id}:
    get:
      summary: Get a payment
      operationId: getPayment
      security:
        - bearerAuth:
            - payments:read
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Payment found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
        default:
          $ref: '#/components/responses/Problem'
  /api/v1/payments/{id}/callback:
    post:
      summary: Process payment provider callback
      operationId: processPaymentCallback
      security:
        - bearerAuth:
            - payments:write
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentCallbackRequest'
      responses:
        '200':
          description: Callback processed or replay ignored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
        default:
          $ref: '#/components/responses/Problem'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    CorrelationId:
      name: Correlation-Id
      in: header
      required: true
      schema:
        type: string
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
    OrderId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    Problem:
      description: RFC 7807 problem details
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
  schemas:
    CreateOrderRequest:
      type: object
      required: [customerId]
      properties:
        customerId:
          type: string
    AddOrderItemRequest:
      type: object
      required: [productId, quantity]
      properties:
        productId:
          type: string
        quantity:
          type: integer
          minimum: 1
    InitiatePaymentRequest:
      type: object
      required: [orderId]
      properties:
        orderId:
          type: string
          format: uuid
    PaymentCallbackRequest:
      type: object
      required: [providerEventId, outcome]
      properties:
        providerEventId:
          type: string
        outcome:
          type: string
          enum: [APPROVED, REJECTED]
        providerTransactionId:
          type: string
        detail:
          type: string
    Order:
      type: object
      required: [id, customerId, status, items, totalAmount]
      properties:
        id:
          type: string
          format: uuid
        customerId:
          type: string
        status:
          type: string
          enum: [DRAFT, CONFIRMED, PAYMENT_PENDING, PAYMENT_APPROVED, PAYMENT_REJECTED, CANCELLED]
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
        totalAmount:
          type: number
        currency:
          type: string
          example: BRL
        paymentRejectionCount:
          type: integer
    OrderItem:
      type: object
      required: [id, productId, quantity]
      properties:
        id:
          type: string
          format: uuid
        productId:
          type: string
        quantity:
          type: integer
        unitPrice:
          type: number
        lineTotal:
          type: number
    Payment:
      type: object
      required: [id, orderId, status, attemptNumber]
      properties:
        id:
          type: string
          format: uuid
        orderId:
          type: string
          format: uuid
        status:
          type: string
          enum: [PENDING, APPROVED, REJECTED]
        attemptNumber:
          type: integer
        providerTransactionId:
          type: string
        amount:
          type: number
        currency:
          type: string
    Problem:
      type: object
      required: [type, title, status, detail, instance]
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
