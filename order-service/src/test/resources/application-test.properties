spring.datasource.url=jdbc:h2:mem:orders;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost/test
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost/test/certs
external.customer-base-url=http://localhost:8089
external.catalog-base-url=http://localhost:8089
external.payment-base-url=http://localhost:8089
external.notification-base-url=http://localhost:8089
