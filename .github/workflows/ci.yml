name: order-service-ci

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - run: ./mvnw -f order-service/pom.xml test
      - run: ./mvnw -f order-service/pom.xml verify
      - run: ./mvnw -f order-service/pom.xml org.pitest:pitest-maven:mutationCoverage
      - run: docker build -t order-service:ci order-service
      - uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"
